# .wt.conf -- scripts/wt config for recyclable.
# See scripts/ provenance: generalized from docker-claude-template.

# Repo default branch (CLAUDE.md: main). origin/HEAD is unset here, so
# set it explicitly rather than relying on auto-detect.
WT_BASE_BRANCH="main"

# Stack DISABLED: docker-compose.yaml uses hardcoded host ports
# (3000:3000, 8000:8000, 5432:5432) and ships no override example, so
# concurrent worktree stacks would collide. wt still gives full
# git-worktree + private/ submodule branch isolation, which is the
# point. To enable the stack later: parameterize the compose host
# ports to ${PORT_*}, add docker-compose.override.yaml.example, set
# WT_STACK=1 and the WT_SERVICES/WT_DB_*/WT_PORT_VARS below.
WT_STACK=0
