# .wt.conf -- scripts/wt config for recyclable.
# See scripts/ provenance: generalized from docker-claude-template.

# Repo default branch (CLAUDE.md: main). origin/HEAD is unset here, so
# set it explicitly rather than relying on auto-detect.
WT_BASE_BRANCH="main"

# Stack DISABLED for wt's built-in stack mode: WT_STACK=1 rebuilds .env
# from .env.example (dropping the real ANTHROPIC_API_KEY) and adds compose
# port-slot vars, which conflicts with WT_COPY_FILES copying the real .env.
# Instead, a worktree runs its OWN stack via the compose override
# (unpublished host ports) plus WT_POST_CREATE below -- see
# docker-compose.override.yaml.example. Reach it with `docker compose
# exec`, not host ports.
WT_STACK=0

# Gitignored files to copy verbatim into a new worktree so it can run
# the app and test suite like the main checkout. `git worktree add` does
# not carry gitignored files, so without this a fresh worktree has no
# .env (config.py reads ANTHROPIC_API_KEY etc.) and no backend/.env.test
# (conftest reads TEST_DATABASE_URL). Paths are relative to the repo root.
WT_COPY_FILES=(".env" "backend/.env.test")

# Run inside a freshly-created worktree (after git + WT_COPY_FILES) to make
# it editor- and test-ready:
#  - copy the compose override so the worktree can run its own stack with
#    unpublished host ports (reach it via `docker compose exec`)
#  - build backend/.venv so the editor's basedpyright resolves imports
#    (`from src.main import app`, fastapi, pytest, ...). `--extra dev`
#    mirrors the Dockerfile dev stage so test tooling (pytest, ruff) is
#    installed. A venv can't be copied -- absolute paths are baked in --
#    so each worktree runs its own `uv sync`.
WT_POST_CREATE='cp -n docker-compose.override.yaml.example docker-compose.override.yaml 2>/dev/null; (cd backend && uv sync --frozen --extra dev)'
