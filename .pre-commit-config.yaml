repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^backend/.*\.py$
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        additional_dependencies:
          - prettier@3.3.3

  # Commit message validation. See .claude/docs/infra/git.md for rules.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - test
          - docs
          - chore
          - ci

  - repo: local
    hooks:
      # TEMPORARY: changed-files only, errors-only. basedpyright exits
      # non-zero on warnings, and the tree carries ~167 pre-existing
      # warnings (FastAPI Depends defaults, unused-call-result). Restore
      # the whole-tree, warnings-included check once that backlog is
      # cleared.
      - id: basedpyright
        name: basedpyright (backend type check, changed files)
        entry: bash -c 'cd backend && uv run basedpyright --level error "${@#backend/}"' --
        language: system
        files: ^backend/.*\.py$
        pass_filenames: true

      - id: check-commit-msg
        name: project commit message rules
        entry: bin/check-commit-msg
        language: script
        stages: [commit-msg]

      - id: check-branch-name
        name: project branch name rules (conventional-branch)
        entry: bin/check-branch-name
        language: script
        stages: [pre-push]
        always_run: true
        pass_filenames: false
