  title: Synthetic Recycling Guide
  authority_level: 1
  source_text: >-
    Aluminum cans are accepted for curbside recycling. Place them in your
    blue bin. Plastic bottles are accepted for curbside recycling. Rinse
    before placing in the bin. Glass bottles are accepted for recycling.
    Place them in the clear bin. Cardboard is accepted for curbside recycling.
    Flatten before placing at curb. Plastic bags are not accepted in the
    curbside program. Take them to a drop-off location. Paper is accepted
    for curbside recycling. Bundle and place at curb. Motor oil is not
    accepted in curbside. It requires hazardous waste drop-off.

