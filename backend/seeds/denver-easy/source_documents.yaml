    Trash, Recycle, Compost: Collection Schedules and Guidelines - City and
    County of Denver Skip to main content Trash, Recycle, Compost: Collection
    Schedules and Guidelines Check the calendar below and sign up for reminders
    so you never miss a collection! Holidays 2026 Observed Holidays; Solid
    Waste operations will be closed and collections delayed one day: New Year's
    Day: Thursday, January 1 Memorial Day: Monday, May 25 Independence Day
    (Observed) : Friday, July 3 Labor Day: Monday, September 7 Thanksgiving
    Day: Thursday, November 26 Christmas Day: Friday, December 25 2026 Working
    Holidays; set your cart out on your regular collection day: Martin Luther
    King Jr. Day: Monday, January 19 Presidents' Day: Monday, February 16 Si
    Se Puede Day: Monday, March 30 Juneteenth: Friday, June 19 Indigenous
    Peoples' Day : Monday, October 12 Veterans Day: Wednesday, November 11
    When service falls on or after an observed holiday , your collection will be
    delayed one day for the rest of that week only. Missed Pickups HOLIDAY
    WEEKS: During observed holiday weeks, the collection schedule is delayed by
    one day following the holiday. BLOCKED OR IMPROPER SET OUT: Sometimes trash
    or recycling can't be collected because containers are blocked or were set
    out incorrectly. If your trash, compost, or recycling was missed (and not
    for one of the above reasons), please call us at 311 (720-913-1311). Cart
    Set-out Guidelines No Construction / Demolition / Remodeling material
    accepted for Trash Collection Please follow these cart set-out and service
    guidelines to help us safely and effectively collect your carts: Set out
    cart from 6:00 a.m. to 5:00 p.m. on service day Collection vehicles will
    not return for late set-outs Allow 2 feet of clearance on each side of
    carts to ensure collection Keep cart lid closed Carts that are overfilled,
    stuffed, or too heavy cannot be emptied Recycling is collected every other
    week, on the same day as trash and compost. Seasonal Awareness Inclement
    weather may cause service delays. Thank you for your patience and for
    helping keep the crews safe! Download the Trash and Recycling App: Sign up
    for notifications on the FREE Denver Trash and Recycling App to be informed
    of service delays.
