    Recycling Service - City and County of Denver Skip to main content
    Recycling Service To learn more about Denver's residential recycling
    program, check out the frequently asked questions below. More questions?
    Reach out to us at denvercartsmart@denvergov.org . Find other Solid Waste
    Management services Schedules and Reminders Cart Service Guidelines Denver
    Utilities Online Diversion Progrograms What should I recycle? Learn what is
    accepted in Denver's recycling program by visiting the Accepted for
    Recycling page, or searching the Waste Directory . Please prevent
    wishcycling and know before you throw! Remember to keep all recycling items
    LOOSE in your curbside cart. Do not bag them! Why should I recycle?
    Recycling offers numerous benefits, such as resource conservation,
    preventing environmental damage, and supporting a circular economy.
    Recycling prolongs the life of the landfill by keeping valuable materials
    in the production cycle. What is recycling? Recycling is the process of
    turning items or materials into new items. Recycling is based on supply and
    demand. While many items can be physically recycled, not all items are
    accepted in Denver's purple carts. Denver accepts items that are
    recyclable, can be safely collected, transported and processed, and have
    reliable end markets for manufacturing. How can I look up my recycling day?
    Recycling is collected every other week, on the same day as trash and
    compost. Visit the Schedules and Reminders page or download the FREE Denver
    Trash and Recycling app; enter in your address to find your schedule. Sign
    up for email, phone, or push notification to receive collection reminders
    and service alerts. Where does my recycling go? Recycling is collected by
    Solid Waste Management and transported to a Materials Recovery Facility
    (MRF), operated by Republic Services. Materials are unloaded onto a tipping
    floor, then sent through the facility to be sorted by commodity type. Items
    travel on a conveyor belt through a combination of manual, mechanical, and
    automated processes, including screens, magnets, blowers, and optical
    sorters that identify different material types. Contamination, or residue,
    is removed and sent to the landfill. What is contamination? Contamination is
    non-recyclable material that is put into the recycling stream. Contamination
    in the recycling may include plastic bags, trash, pet waste, non-recyclable
    plastics, yard trimmings, hazardous waste, or electronics. Contaminated
    carts cannot be collected, and carts that are repeatedly contaminated may be
    subject to removal. Why can't I put my recycling in plastic bags? Plastic
    bags and other soft, filmy plastic are Denver's #1 recycling contaminant.
    Plastic bags are NOT accepted in the purple carts, even if the bag is
    labeled as "recyclable." Why do I have to empty out bottles, cans, and
    jars? Recycling sorting and processing cannot handle food residue and
    liquid. Please ensure all containers are empty and free of food and liquid.
    Thicker residue like peanut butter may need a quick rinse before recycling.
    Do I need to look at #1-7 when recycling plastics? Maybe! Denver accepts
    plastic containers labeled #1-6, including bottles, tubs, jugs, jars, and
    cups. If it is not a container, it should not go in the recycling. Should I
    crush plastic bottles or cans? Do not crush items like plastic bottles or
    aluminum cans before placing them in your cart. Can I recycle pizza boxes?
    Yes, non-greasy pizza boxes are recyclable. A small amount of grease is
    acceptable, but all food and small plastic items should be removed. You can
    remove any sections of the box that has significant food and grease residue
    and dispose of it in the black trashcart, and recycle the clean portion.
    I live in an apartment, can I recycle? Solid Waste Management collects
    recycling from residential buildings, including multi-family buildings up to
    7 units. If you live in a building with 8+ units or are interested in
    recycling at your business, please visit the Universal Recycling and
    Composting Ordinance page to learn more about commercial recycling and
    composting in Denver.

