    Accepted for Recycling - City and County of Denver Skip to main content
    Accepted for Recycling Check the Waste Directory to see what materials
    should go in the recycling cart! Want to dive into different material
    types? Check out "Common Recyclables" below. Common Recyclables Recycling
    Tips NO PLASTIC BAGS of any kind allowed in the recycling. If you bag your
    recycling, empty out all items and throw the bag away. 2 inches or larger:
    if an item is smaller than the palm of your hand, it's too small to
    recycle. Lids and caps may be attached to bottles and placed in the
    recycling. Loose lids and caps should be placed in the trash. Watch out for
    confusing labels! The chasing arrows symbol (resin identification code)
    alone does not mean an item is accepted in Denver's recycling program. When
    in doubt, throw it out! If you're not sure, check the Waste Directory or
    the lists below. If an item is not listed, do not put it in the recycling.
    See more frequently asked questions about Denver's recycling program here .
    Plastics Accepted Solid Waste accepts plastic containers, like bottles,
    tubs, jugs, jars, and cups. All containers should be empty before
    recycling. Containers include: Plastic cups Bottles for milk, juice, soda,
    and water Shampoo and conditioner bottles Detergent and softener containers
    Buckets up to 5 gallons (remove wire handle) Empty prescription bottles
    Empty spray bottles Tubs for yogurt and margarine Clear "clam-shell"
    containers Not Accepted Solid Waste does not accept plastic items that are
    not containers, including: Plastic bags (grocery and trash bags)-- Denver's
    #1 contaminant! Soft plastics (shrink wrap, bubble wrap, soft plastic
    packaging, bubble mailers) Bubble wrap Styrofoam and packing peanuts
    Wrappers, condiment packets, juice pouches, and chip bags Plastic buckets
    over 5 gallons (remove handle) Tangling items like garden hoses and
    Christmas lights Coffee pods and single-serving creamers "Compostable"
    packaging and containers Containers without the RIC #1-7 stamp Plastic
    cutlery and straws Metals Accepted Aluminum beverage cans Tin and steel
    cans, like soup, fruit, vegetable, and pet food cans Aluminum foil ( clean
    and balled up ) Aluminum catering and pie trays All items should be empty
    and free of food residue Not Accepted Automotive parts Scrap metal Propane
    and other metal tanks Metal hangers Pots and pans Foil bags (ex. potato
    chip bags) Yogurt lids Glass Accepted Beverage bottles Glass jars Not
    Accepted Window or automotive glass Mirrors Ceramics Heat resistant kitchen
    glass (ex. bakeware and measuring cups) Wine glasses Light bulbs Cardboard
    & Paperboard Accepted All cardboard and paperboard boxes should be
    flattened . Cereal and cracker boxes Shipping and delivery boxes (flatten
    and cut to no larger than 2 ft x 2 ft) Non-greasy pizza boxes (recycle the
    clean part and discard the greasy or soiled portion) Dairy milk, nut milk,
    and juice cartons (Tetra Pak packaging) Frozen food boxes Gift and shoe
    boxes Hanging file folders Milk cartons Paper towel and toilet paper tubes
    Not Accepted Foil-coated paperboard Waxed cardboard Paper Accepted Mail :
    greeting cards, postcards, letters, envelopes, stationery, brochures,
    direct mail Office supplies : index cards, file folders, office paper School
    supplies : loose-leaf paper, copy and typing paper, note pads, spiral
    notebooks (remove metal spirals) Additional materials : glossy ads, phone
    books (remove plastic bags and non-paper inserts), magazines, newspapers,
    coupons, coffee cups, paper bags Stamps, staples, tape, sticky notes, and
    plastic windows are accepted. Not Accepted Paper towels and napkins Tissue
    paper Bubble envelopes Shredded paper Paper plates Wet or greasy paper
    Wrapping paper Books Plastic or wax-line to-go containers Don't Waste the
    Good Stuff Flyer Download the "Don't Waste the Good Stuff" Flyer to learn
    more about what does, and doesn't go in Denver's recycling and compost.

