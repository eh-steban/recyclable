    Recycle - City and County of Denver Skip to main content Recycle Recycling
    is collected every other week. Check your schedule online or on the Denver
    Trash & Recycling App. Accepted for Recycling Do you know what goes in your
    purple recycling cart? Check out our recycling guidelines and search the
    Waste Directory. Recycling Service Learn more about the Denver Solid Waste
    Management Recycling Services. Cherry Creek Recycling and Compost Drop-off
    The Cherry Creek Recycling and Compost Drop-off provides FREE access to
    single-stream recycling and compost for Denver residents. Electronic
    Recycling Denver Recycles offers Denver residents an "E-cycle Coupon" for
    recycling televisions, monitors, and other electronic items. Household
    Hazardous Waste Household hazardous waste collection service, free paint
    recycling, appliance collection, electronics recycling.

