# Local prod-shape orchestration: web + worker + Postgres.
#
# This is for LOCAL DEVELOPMENT and parity testing only.
# Production deploy targets:
#   - frontend (Next.js)  -> Vercel        (Vercel ignores frontend/Dockerfile)
#   - backend (worker)    -> Railway       (Railway uses backend/Dockerfile)
#   - app-db (Postgres)   -> Neon          (managed; not run anywhere local)
#
# `docker compose up` runs all three locally so you can hit the full stack
# without any cloud accounts wired up.

services:
  app-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recyclable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recyclable_dev}
      POSTGRES_DB: ${POSTGRES_DB:-recyclable}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recyclable} -d ${POSTGRES_DB:-recyclable}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      BACKEND_URL: http://app-backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      # Hot reload: mount source, isolate node_modules and .next
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      app-db:
        condition: service_healthy
    restart: unless-stopped

  app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-recyclable}:${POSTGRES_PASSWORD:-recyclable_dev}@app-db:5432/${POSTGRES_DB:-recyclable}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
    depends_on:
      app-db:
        condition: service_healthy
    # Worker stays up for CLI invocations + optional admin FastAPI server.
    # Override with `docker compose run app-backend python -m src.cli ingest --source ...`
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  app-db-data:
